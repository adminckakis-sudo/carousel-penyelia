<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
/>

<style>

body{
    margin:0;
    padding:0;
}

/* Container Slider */
.swiper{
    width:100%;
    height:60vw;      /* Tinggi mengikuti lebar layar */
    max-height:550px; /* Maksimum di desktop */
    min-height:220px; /* Minimum di HP */
    position:relative;
}

/* Slide */
.swiper-slide{
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Gambar */
.swiper-slide img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* Pagination Dots */
.swiper-pagination{
    position:absolute !important;
    bottom:10px !important;
    left:0;
    width:100%;
}

/* Tombol Next dan Prev */
.swiper-button-next,
.swiper-button-prev{
    color:white;
}

/* Tablet */
@media (max-width:768px){

    .swiper-button-next,
    .swiper-button-prev{
        transform:scale(0.8);
    }

}

/* HP */
@media (max-width:480px){

    .swiper{
        min-height:180px;
    }

    .swiper-button-next,
    .swiper-button-prev{
        transform:scale(0.7);
    }

}

</style>
</head>

<body>

<div class="swiper">

    <div class="swiper-wrapper">

        <div class="swiper-slide">
            <img src="slide1.png" alt="Slide 1">
        </div>

        <div class="swiper-slide">
            <img src="slide2.png" alt="Slide 2">
        </div>

        <div class="swiper-slide">
            <img src="slide3.png" alt="Slide 3">
        </div>

    </div>

    <!-- Pagination -->
    <div class="swiper-pagination"></div>

    <!-- Navigation -->
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

const swiper = new Swiper('.swiper', {

    loop: true,

    autoplay: {
        delay: 5000,
        disableOnInteraction: false,
    },

    pagination: {
        el: '.swiper-pagination',
        clickable: true,
    },

    navigation: {
        nextEl: '.swiper-button-next',
        prevEl: '.swiper-button-prev',
    }

});

</script>

</body>
</html>
